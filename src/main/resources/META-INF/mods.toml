[[mods]]
logoFile = "banner.png"
authors = "Father Toast"
credits = "Sarinsa, Mother Toast, & Baby Toast"
version = "${file.jarVersion}"
displayName = "Co-Op Overhaul"
modId = "coopoverhaul"
description = '''
Co-Op Overhaul provides several features to improve co-operative online play, such as pinging and protections for friendly fire and chunks.

This mod is highly configurable and most features has at least one config option associated with it.
Browsing the configs will provide information on all the mod's features. If more in-depth information is needed, ask in the Discord server.


Download: https://www.curseforge.com/members/fathertoast/projects/

Source: https://github.com/FatherToast/

Discussion: https://discord.gg/GFTzTdX/
'''

